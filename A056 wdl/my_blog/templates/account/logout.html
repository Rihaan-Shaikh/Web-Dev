 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👋 Goodbye - The Digital Diary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        .animate-bounce-gentle {
            animation: bounce-gentle 2s infinite;
        }

        .gradient-text {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 3s ease infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes bounce-gentle {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: linear-gradient(45deg, #5a6fd8, #6a4190);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-80 h-80 bg-purple-500 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-float"></div>
        <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-pink-500 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-float" style="animation-delay: 2s;"></div>
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-blue-500 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-float" style="animation-delay: 4s;"></div>
    </div>

    <div class="relative z-10 text-center px-6 max-w-md">
        <!-- Success Animation -->
        <div class="mb-8 fade-in">
            <div class="w-24 h-24 bg-gradient-to-r from-green-500 to-teal-500 rounded-full flex items-center justify-center mx-auto mb-6 animate-bounce-gentle">
                <i data-lucide="check-circle" class="w-12 h-12 text-white"></i>
            </div>
            <h1 class="text-4xl font-bold gradient-text mb-4">See You Later!</h1>
            <p class="text-white text-opacity-80 text-lg">
                You've been successfully logged out of your account.
            </p>
        </div>

        <!-- Logout Card -->
        <div class="glass rounded-3xl p-8 fade-in">
            <div class="space-y-6">
                <div class="text-center">
                    <h2 class="text-2xl font-semibold text-white mb-2">Thanks for visiting! 🎉</h2>
                    <p class="text-white text-opacity-70">
                        We hope you enjoyed your time with us. Come back soon for more amazing content!
                    </p>
                </div>

                <!-- Quick Actions -->
                <div class="grid grid-cols-1 gap-4">
                    <a href="{% url 'account_login' %}"
                       class="btn-primary text-white py-3 px-6 rounded-xl font-medium flex items-center justify-center space-x-2">
                        <i data-lucide="log-in" class="w-5 h-5"></i>
                        <span>Sign Back In</span>
                    </a>

                    <a href="{% url 'home' %}"
                       class="glass text-white py-3 px-6 rounded-xl font-medium flex items-center justify-center space-x-2 hover:bg-white hover:bg-opacity-10 transition-all duration-300">
                        <i data-lucide="home" class="w-5 h-5"></i>
                        <span>Back to Home</span>
                    </a>
                </div>

                <!-- Social Links -->
                <div class="pt-6 border-t border-white border-opacity-20">
                    <p class="text-white text-opacity-60 text-sm mb-4">Follow us for more updates</p>
                    <div class="flex justify-center space-x-4">
                        <a href="#" class="text-white text-opacity-60 hover:text-white transition-colors">
                            <i data-lucide="twitter" class="w-6 h-6"></i>
                        </a>
                        <a href="#" class="text-white text-opacity-60 hover:text-white transition-colors">
                            <i data-lucide="instagram" class="w-6 h-6"></i>
                        </a>
                        <a href="#" class="text-white text-opacity-60 hover:text-white transition-colors">
                            <i data-lucide="linkedin" class="w-6 h-6"></i>
                        </a>
                        <a href="#" class="text-white text-opacity-60 hover:text-white transition-colors">
                            <i data-lucide="github" class="w-6 h-6"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Fun Message -->
        <div class="mt-8 fade-in">
            <p class="text-white text-opacity-50 text-sm">
                "The best way to predict the future is to create it." - Peter Drucker
            </p>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Auto redirect after 10 seconds
        let countdown = 10;
        const countdownElement = document.createElement('p');
        countdownElement.className = 'text-white text-opacity-60 text-sm mt-4';
        countdownElement.textContent = `Auto-redirecting to home in ${countdown} seconds...`;
        document.querySelector('.mt-8.fade-in').appendChild(countdownElement);

        const countdownInterval = setInterval(() => {
            countdown--;
            countdownElement.textContent = `Auto-redirecting to home in ${countdown} seconds...`;

            if (countdown <= 0) {
                clearInterval(countdownInterval);
                window.location.href = '{% url "home" %}';
            }
        }, 1000);
    </script>
</body>
</html>
